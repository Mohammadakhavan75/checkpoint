services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: checkpoint
      POSTGRES_USER: checkpoint
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD must be set}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkpoint -d checkpoint"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./api
    environment:
      APP_ENV: production
      DATABASE_URL: "postgresql+asyncpg://checkpoint:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/checkpoint"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://infiniteai.space,https://www.infiniteai.space}
      SEED_ON_START: ${SEED_ON_START:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}

    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    # entrypoint runs `alembic upgrade head` (+ optional seed) then uvicorn

  web:
    build:
      context: ./web
      # Vite inlines VITE_* into the bundle at build time, so these must be
      # build args — runtime `environment:` has no effect on a production build.
      args:
        VITE_API_BASE: ${VITE_API_BASE:-https://api.infiniteai.space/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pgdata:
