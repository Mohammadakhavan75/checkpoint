<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRAIN//OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root{
  --ink:#0b0d10; --panel:#13161b; --panel2:#171b21; --raise:#1d222a;
  --line:#242a32; --line2:#333b45;
  --text:#dde3ea; --dim:#8b95a1; --faint:#586470;
  --amber:#ffb454; --amber2:#7a4f1c;
  --cyan:#5ad1e6; --green:#5fd97a; --yellow:#e8c84a; --orange:#ff9d4d; --red:#ff5a52; --violet:#b08bff;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(120% 90% at 80% -10%, #14181e 0%, var(--ink) 55%),
    var(--ink);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
body::before{ /* scanline + grid texture */
  content:""; position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.5;
  background:
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.18) 2px 3px),
    linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px) 0 0/100% 26px;
  mix-blend-mode:overlay;
}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;color:var(--text)}
::selection{background:var(--amber);color:#000}

/* ===== shell ===== */
.app{position:relative;z-index:2;height:100%;display:grid;grid-template-rows:auto 1fr;}
header{
  display:flex;align-items:center;gap:18px;padding:10px 18px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(var(--panel),var(--ink));
}
.brand{font-family:'JetBrains Mono';font-weight:800;letter-spacing:1px;font-size:16px;color:var(--text)}
.brand b{color:var(--amber)}
.led{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2.6s infinite}
@keyframes blink{0%,92%,100%{opacity:1}95%{opacity:.25}}
.ticker{flex:1;min-width:0;overflow:hidden;border-left:1px solid var(--line);padding-left:16px;color:var(--faint);
  font-family:'JetBrains Mono';font-size:12px;white-space:nowrap}
.ticker b{color:var(--dim);font-weight:500}
.cap{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line2);
  border-radius:7px;padding:6px 8px 6px 12px;min-width:340px}
.cap span{color:var(--amber);font-family:'JetBrains Mono';font-weight:700;font-size:12px}
.cap input{flex:1;background:none;border:none;outline:none;font-size:13px}
.cap input::placeholder{color:var(--faint)}
.cap kbd{font-family:'JetBrains Mono';font-size:10px;color:var(--faint);border:1px solid var(--line2);
  padding:1px 5px;border-radius:4px}

.body{display:grid;grid-template-columns:248px 1fr;min-height:0}
aside{border-right:1px solid var(--line);overflow:auto;padding:14px 0;background:linear-gradient(180deg,var(--ink),#0c0f13)}
main{overflow:auto;padding:22px 26px 80px}

/* ===== sidebar ===== */
.sect{padding:0 14px;margin:6px 0 18px}
.sect h4{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:1.5px;color:var(--faint);
  text-transform:uppercase;margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
.navbtn{width:100%;display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;
  font-size:13px;color:var(--dim);text-align:left;border:1px solid transparent}
.navbtn:hover{background:var(--panel);color:var(--text)}
.navbtn.on{background:var(--panel2);color:var(--text);border-color:var(--line2)}
.navbtn .cnt{margin-left:auto;font-family:'JetBrains Mono';font-size:11px;color:var(--faint);
  background:#0c0f13;border:1px solid var(--line);padding:0 6px;border-radius:10px}
.navbtn.on .cnt{color:var(--amber);border-color:var(--amber2)}
.dom-dot{width:7px;height:7px;border-radius:2px;background:var(--line2)}

.legend{font-size:11.5px;color:var(--dim)}
.legend div{display:flex;align-items:center;gap:8px;padding:3px 0}
.sym{font-family:'JetBrains Mono';width:16px;text-align:center;font-weight:700}

/* ===== views ===== */
.viewhead{display:flex;align-items:flex-end;gap:14px;margin-bottom:4px}
.viewhead h1{font-family:'JetBrains Mono';font-weight:800;font-size:24px;margin:0;letter-spacing:.5px}
.viewhead .sub{color:var(--faint);font-size:12.5px;font-family:'JetBrains Mono';margin-bottom:3px}
.lead{color:var(--dim);max-width:760px;margin:8px 0 22px;font-size:13.5px}

.tabbar{display:flex;gap:4px;margin:0 0 18px;border-bottom:1px solid var(--line)}
.tab{padding:9px 16px;font-family:'JetBrains Mono';font-size:12.5px;color:var(--faint);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--dim)}
.tab.on{color:var(--amber);border-color:var(--amber)}

/* item rows */
.rows{display:flex;flex-direction:column;gap:9px}
.row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;padding:11px 13px;transition:border-color .15s,transform .15s}
.row:hover{border-color:var(--line2)}
.row .marker{font-family:'JetBrains Mono';font-weight:700;width:18px;text-align:center;flex:none}
.row .ttl{flex:1;min-width:0}
.row .ttl .name{font-weight:500}
.row .ttl .meta{font-family:'JetBrains Mono';font-size:11px;color:var(--faint);margin-top:2px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row.killed .name{text-decoration:line-through;color:var(--faint)}
.row.done{opacity:.8}

.chip{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;border:1px solid currentColor;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.mode-chip{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);border:1px solid var(--line2);
  padding:1px 7px;border-radius:5px;letter-spacing:.5px}

.acts{display:flex;gap:6px;flex:none}
.btn{font-family:'JetBrains Mono';font-size:11.5px;padding:6px 11px;border-radius:6px;
  border:1px solid var(--line2);color:var(--dim);background:var(--panel2)}
.btn:hover{color:var(--text);border-color:var(--text)}
.btn.amber{color:#1a1206;background:var(--amber);border-color:var(--amber);font-weight:600}
.btn.amber:hover{background:#ffc477}
.btn.ghost{background:none;border-color:transparent;color:var(--faint)}
.btn.ghost:hover{color:var(--text)}

.empty{color:var(--faint);font-family:'JetBrains Mono';font-size:12.5px;border:1px dashed var(--line2);
  border-radius:9px;padding:26px;text-align:center}

/* compiled summary block on daily rows */
.exec{display:grid;grid-template-columns:repeat(2,1fr);gap:0;margin-top:10px;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.exec div{padding:8px 11px;border-right:1px solid var(--line)}
.exec div:last-child{border-right:none}
.exec .k{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
.exec .v{font-size:12.5px;margin-top:3px;color:var(--text)}
.resume{margin-top:9px;font-family:'JetBrains Mono';font-size:11.5px;color:var(--green);
  background:#0e1512;border:1px solid #1d3a28;border-radius:6px;padding:7px 10px}
.resume b{color:#9be6b0}

/* ===== containers / phases ===== */
.row.parent{border-color:#33294d;background:linear-gradient(var(--panel),#15121d)}
.caret{font-family:'JetBrains Mono';color:var(--dim);width:18px;flex:none;font-size:12px}
.caret:hover{color:var(--text)}
.prog{display:inline-block;width:90px;height:5px;border-radius:3px;background:var(--line);overflow:hidden;vertical-align:middle}
.prog .bar{display:block;height:100%;background:var(--violet);transition:width .3s}
.row.child{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
.row.child.next{border-color:var(--amber);box-shadow:0 0 16px -8px var(--amber)}
.row.child.done{opacity:.7}
.row.child.killed .name{text-decoration:line-through;color:var(--faint)}
.phase-no{font-family:'JetBrains Mono';font-size:10px;color:var(--violet);border:1px solid var(--line2);
  border-radius:5px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex:none}
.subs{display:flex;flex-direction:column;gap:7px}
.subrow{display:flex;align-items:center;gap:8px}
.subrow input{background:var(--ink);border:1px solid var(--line2);border-radius:7px;padding:8px 10px;font-size:12.5px;outline:none}
.subrow input:focus{border-color:var(--amber)}
.subrow .sub-title{flex:1.1}
.subrow .sub-fa{flex:1.5}

/* ===== matrix ===== */
.matrix{display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;max-width:760px}
.matrix .hd{font-family:'JetBrains Mono';font-size:11px;color:var(--faint);align-self:center;text-transform:uppercase;letter-spacing:1px}
.cell{border:1px solid var(--line2);border-radius:9px;padding:14px;background:var(--panel);cursor:pointer;transition:.15s}
.cell:hover{transform:translateY(-2px)}
.cell.sel{box-shadow:0 0 0 1px currentColor inset, 0 0 22px -8px currentColor}
.cell h5{font-family:'JetBrains Mono';margin:0 0 4px;font-size:13.5px}
.cell p{margin:0;font-size:12px;color:var(--dim)}
.cell .tag{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.5px;margin-bottom:7px;display:inline-block}

/* ===== modal ===== */
.scrim{position:fixed;inset:0;z-index:30;background:rgba(4,5,7,.72);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.modal{background:linear-gradient(var(--panel),#0f1216);border:1px solid var(--line2);border-radius:14px;
  width:100%;max-width:680px;box-shadow:0 30px 80px -20px #000;animation:pop .22s ease}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.985)}to{opacity:1;transform:none}}
.modal header{background:none;border-bottom:1px solid var(--line);padding:16px 22px;display:flex;align-items:center;gap:12px}
.modal header .ic{font-family:'JetBrains Mono';color:var(--amber);font-weight:800}
.modal header h3{margin:0;font-family:'JetBrains Mono';font-size:16px}
.modal header .x{margin-left:auto;color:var(--faint);font-size:20px;line-height:1}
.modal .pad{padding:20px 22px}
.modal .note{font-size:12.5px;color:var(--dim);margin:-4px 0 16px}

.field{margin-bottom:13px}
.field label{display:block;font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:1px;
  text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.field label .req{color:var(--orange)}
.field input,.field textarea,.field select{width:100%;background:var(--ink);border:1px solid var(--line2);
  border-radius:7px;padding:9px 11px;font-size:13px;outline:none;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--amber)}
.field .hint{font-size:11px;color:var(--faint);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.modal footer{border-top:1px solid var(--line);padding:14px 22px;display:flex;gap:10px;justify-content:flex-end;align-items:center}
.gate{margin-right:auto;font-family:'JetBrains Mono';font-size:11.5px;color:var(--orange)}
.gate.ok{color:var(--green)}

.modechips{display:flex;gap:6px;flex-wrap:wrap}
.modechips button{font-family:'JetBrains Mono';font-size:11px;padding:5px 10px;border-radius:6px;
  border:1px solid var(--line2);color:var(--dim)}
.modechips button.on{background:var(--cyan);color:#04181c;border-color:var(--cyan);font-weight:600}

/* ===== session overlay ===== */
.session{position:fixed;inset:0;z-index:40;background:radial-gradient(120% 90% at 50% -10%,#15191f,#070809);
  display:flex;flex-direction:column;animation:pop .25s ease}
.session .top{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line)}
.session .top .lab{font-family:'JetBrains Mono';color:var(--faint);font-size:12px;letter-spacing:1px}
.session .top h2{margin:0;font-size:18px;font-family:'JetBrains Mono'}
.session .top .close{margin-left:auto;color:var(--faint);font-family:'JetBrains Mono';font-size:12px;border:1px solid var(--line2);padding:6px 12px;border-radius:6px}
.session .stage{flex:1;display:grid;grid-template-columns:300px 1fr;min-height:0}
.session .clockwrap{border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
.ring{position:relative;width:200px;height:200px}
.ring svg{transform:rotate(-90deg)}
.ring .time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .time .t{font-family:'JetBrains Mono';font-size:38px;font-weight:800;letter-spacing:1px}
.ring .time .bt{font-family:'JetBrains Mono';font-size:11px;color:var(--faint);letter-spacing:2px;text-transform:uppercase}
.blockpick{display:flex;flex-direction:column;gap:6px;width:100%}
.blockpick button{font-family:'JetBrains Mono';font-size:12px;text-align:left;padding:8px 11px;border-radius:7px;
  border:1px solid var(--line);color:var(--dim);display:flex;justify-content:space-between}
.blockpick button.on{border-color:var(--amber);color:var(--amber);background:#1a130699}
.clockbtns{display:flex;gap:8px}
.session .work{padding:30px 36px;overflow:auto}
.session .work .focus{font-family:'JetBrains Mono';font-size:11px;letter-spacing:2px;color:var(--faint);text-transform:uppercase}
.session .work .fa{font-size:22px;margin:8px 0 22px;line-height:1.35}
.swrow{display:flex;gap:14px;margin-bottom:14px}
.scard{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:13px 15px}
.scard .k{font-family:'JetBrains Mono';font-size:10px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase}
.scard .v{margin-top:5px;font-size:13.5px}
.scard.win{border-color:#1d3a28} .scard.win .k{color:var(--green)}
.scard.stop{border-color:#3a2a1d} .scard.stop .k{color:var(--orange)}

.fade-in{animation:fade .5s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.s1{animation-delay:.04s}.s2{animation-delay:.10s}.s3{animation-delay:.16s}.s4{animation-delay:.22s}

@media(max-width:880px){
  .body{grid-template-columns:1fr} aside{display:none}
  .cap{min-width:0} .session .stage{grid-template-columns:1fr}
  .exec{grid-template-columns:1fr} .session .clockwrap{border-right:none;border-bottom:1px solid var(--line)}
}
</style>

<div class="app">
  <header>
    <span class="led"></span>
    <span class="brand">BRAIN<b>//</b>OS</span>
    <div class="ticker mono" id="ticker"></div>
    <div class="cap">
      <span>CAP&gt;</span>
      <input id="capInput" placeholder="capture a thought, idea, task fragment…" autocomplete="off">
      <kbd>↵</kbd>
    </div>
  </header>

  <div class="body">
    <aside id="aside"></aside>
    <main id="main"></main>
  </div>
</div>

<div id="overlay"></div>

<script>
/* ============================================================
   STATE  (in-memory only — refresh resets. No backend yet.)
   ============================================================ */
const STATES = {
  idea:        {label:'Idea',          color:'var(--faint)',  sym:'·'},
  needsdef:    {label:'Needs Def',     color:'var(--yellow)', sym:'○'},
  scout:       {label:'Scout',         color:'var(--cyan)',   sym:'?'},
  active:      {label:'Active',        color:'var(--amber)',  sym:'▸'},
  waiting:     {label:'Waiting',       color:'var(--dim)',    sym:'…'},
  blocked:     {label:'Blocked',       color:'var(--red)',    sym:'!'},
  deferred:    {label:'Deferred',      color:'var(--orange)', sym:'→'},
  killed:      {label:'Killed',        color:'var(--red)',    sym:'✕'},
  done:        {label:'Done',          color:'var(--green)',  sym:'✓'},
};
const DOMAINS = ['DDWS','HPC','Farokhi','Research','Teaching','Personal'];
const MODES = ['Do','Scout','Plan'];
// classification quadrant → mode. Unknown+unbounded is intentionally unset (TBD — to discuss).
const CLASS_MODE = {'known|bounded':'Do','unknown|bounded':'Scout','known|unbounded':'Plan','unknown|unbounded':''};
const BLOCKS = [
  {id:'ignition', name:'Ignition',  min:25, use:'start a hard / vague task'},
  {id:'scout',    name:'Scout',     min:40, use:'map an unknown topic'},
  {id:'exec',     name:'Execution', min:75, use:'known technical work'},
  {id:'deep',     name:'Deep work', min:120,use:'architecture · debug · design'},
  {id:'closure',  name:'Closure',   min:12, use:'write checkpoint + next action'},
];
const RULES = [
  'Finish the session cleanly — not the whole task.',
  'No checkpoint location → task is not allowed to start.',
  'Unknown task → scout, do not execute.',
  'Big known task → phase it.',
  'Externalize state before stopping. Don\'t make future-you rebuild context.',
  'Today\'s list holds executable units only — never raw ambitions.',
];

let UID = 100;
const uid = () => 'i'+(++UID);

const blank = () => ({mode:'',description:'',firstAction:'',risk:'',resumeFrom:'',procedure:'',scope:''});

let store = [
  // ---- reservoir (brain rots) ----
  ...['Game Theory','Reinforcement Learning','Quantum Physics','Trader AI','Credit automation','New website']
     .map(t=>({id:uid(),title:t,domain:'reservoir',state:'idea',f:blank(),daily:false,receipt:null})),

  // ---- DDWS ----
  mk('Benchmark LLM distribution','DDWS','idea'),
  {id:uid(), title:'Deploy checkpoint app', domain:'DDWS', state:'active', daily:false, compiled:true,
   f:{mode:'Do', description:'Ship the training-checkpoint browser app to the DDWS staging host.',
      firstAction:'pull latest build, run the deploy script against staging',
      risk:'staging env vars may differ from local', resumeFrom:'staging deploy step',
      procedure:'known', scope:'bounded'}, receipt:null},
  mk('Prepare LLM documentation','DDWS','needsdef'),
  mk('Add LLM deployment service','DDWS','idea'),
  mk('Study LLM Security','DDWS','needsdef'),

  // ---- HPC ----
  mk('Redis problem alerting','HPC','idea'),
  mk('Review backup system','HPC','needsdef'),
  mk('HAProxy client IP forwarding','HPC','idea'),
  mk('Resolve nano cluster','HPC','blocked'),
  // 'Setup Ubuntu/Slurm cluster' is created below as a Time-trap parent with phases

  // ---- Research ----
  mk('Paper Search','Research','scout'),
];
function mk(title,domain,state){return {id:uid(),title,domain,state,f:blank(),daily:false,receipt:null};}

// A fully-compiled, daily, already-checkpointed example to show the resume loop
store.push({
  id:uid(), title:'Build vLLM image', domain:'DDWS', state:'active', daily:true, compiled:true,
  f:{mode:'Do',description:'Containerized vLLM serving image (CUDA + Torch + Transformers + vLLM), tested locally before push.',whyNow:'serving stack blocks the benchmark work',
     output:'working local Docker image (CUDA+Torch+Transformers+vLLM)',
     firstAction:'docker build from CUDA base image',
     minWin:'image builds and `vllm --version` runs inside it',
     stopRule:'stop once test command passes, or first hard error',
     checkpointRule:'record Dockerfile, build cmd, test cmd, any errors',
     resumeFrom:'docker push step',
     risk:'registry certificate may fail during push',
     procedure:'known', scope:'bounded'},
  receipt:{outcome:'deferred',
     lastState:'image works locally, not pushed yet',
     whatChanged:'CUDA + Torch + Transformers + vLLM stack installed',
     problems:'registry certificate may fail during push',
     nextAction:'push to registry, test remote pull',
     resumeFrom:'docker push step',
     doNotRedo:'base image + python deps already installed'}
});
store.push({
  id:uid(), title:'Scout LLM Security', domain:'DDWS', state:'scout', daily:true, compiled:true,
  f:{mode:'Scout',description:'Map the LLM attack surface relevant to DDWS before any public-facing deployment.',whyNow:'DDWS needs secure LLM deployment before public usage',
     output:'security-map.md',
     firstAction:'list 5 LLM attack categories + one concrete example each',
     minWin:'pick the top 2 DDWS-relevant risks',
     stopRule:'stop after 45 min even if the field is incomplete',
     checkpointRule:'write sources, learned concepts, next action',
     resumeFrom:'security-map.md',
     risk:'topic can expand infinitely',
     procedure:'unknown', scope:'bounded'},
  receipt:null
});

// ---- a Time-trap parent (pure container) with phase children ----
const _slurm = {id:uid(), title:'Setup Ubuntu/Slurm cluster', domain:'HPC', state:'active', compiled:true, daily:false, parentId:null,
  f:{mode:'Plan', description:'Stand up a Slurm-scheduled Ubuntu cluster for HPC jobs — known steps, but unbounded in practice.',
     firstAction:'', risk:'per-node hardware quirks', resumeFrom:'', procedure:'known', scope:'unbounded'}, receipt:null};
store.push(_slurm);
[['Phase 1: inventory nodes + network','ssh each node, record specs + IPs','done'],
 ['Phase 2: base Ubuntu + admin user','install Ubuntu LTS, create admin user','active'],
 ['Phase 3: install Slurm controller','apt install slurm-wlm on the head node','active'],
 ['Phase 4: register compute nodes','write the node entries in slurm.conf','needsdef']]
 .forEach(([t,fa,st])=>store.push({id:uid(), title:t, domain:'HPC', state:st, compiled:!!fa, daily:false, parentId:_slurm.id,
   f:{mode:'Do', description:t, firstAction:fa, risk:'', resumeFrom:'', procedure:'known', scope:'bounded'}, receipt:null}));

// every item has an explicit parentId (null = top-level)
store.forEach(i=>{ if(i.parentId===undefined) i.parentId=null; });

/* ============================================================
   VIEW STATE
   ============================================================ */
let view = {tab:'today', domain:'DDWS', expanded:new Set()};   // tab: today | ready | reservoir | domain
store.filter(i=>isParent(i)).forEach(p=>view.expanded.add(p.id));   // containers start expanded
let modal = null;                            // {kind, id}
let session = null;                          // {id, block, remaining, timer}

/* ============================================================
   RENDER
   ============================================================ */
const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const items = (pred) => store.filter(pred);

function chip(state){const s=STATES[state];return `<span class="chip" style="color:${s.color}">${s.label}</span>`;}

function renderTicker(){
  $('#ticker').innerHTML = `<b>RULE</b> · ${esc(RULES[Math.floor(Date.now()/6000)%RULES.length])}`;
}

function renderAside(){
  const todayN = items(i=>i.daily && !isParent(i) && i.state!=='killed').length;
  const readyN = items(i=>i.compiled && !i.daily && !isParent(i) && i.state!=='killed' && i.state!=='done').length;
  const resN = items(i=>i.domain==='reservoir').length;
  const dom = DOMAINS.map(d=>{
    const n = items(i=>i.domain===d).length;
    const on = view.tab==='domain'&&view.domain===d;
    return `<button class="navbtn ${on?'on':''}" onclick="go('domain','${d}')">
      <span class="dom-dot"></span>${d}<span class="cnt">${n}</span></button>`;
  }).join('');
  const legend = Object.entries(STATES).map(([k,s])=>
    `<div><span class="sym" style="color:${s.color}">${s.sym}</span>${s.label}</div>`).join('');

  $('#aside').innerHTML = `
    <div class="sect">
      <h4>Execution</h4>
      <button class="navbtn ${view.tab==='today'?'on':''}" onclick="go('today')">▸ Today<span class="cnt">${todayN}</span></button>
      <button class="navbtn ${view.tab==='ready'?'on':''}" onclick="go('ready')">⚑ Ready to GO!<span class="cnt">${readyN}</span></button>
    </div>
    <div class="sect">
      <h4>Domains</h4>${dom}
    </div>
    <div class="sect">
      <h4>Reservoir</h4>
      <button class="navbtn ${view.tab==='reservoir'?'on':''}" onclick="go('reservoir')">~ Brain Rots<span class="cnt">${resN}</span></button>
    </div>
    <div class="sect">
      <h4>State Legend</h4>
      <div class="legend">${legend}</div>
    </div>`;
}

function renderMain(){
  const m = $('#main');
  if(view.tab==='today')     return m.innerHTML = viewToday();
  if(view.tab==='ready')     return m.innerHTML = viewReady();
  if(view.tab==='reservoir') return m.innerHTML = viewReservoir();
  if(view.tab==='domain')    return m.innerHTML = viewDomain();
}

/* ---------- TODAY + READY TO GO ---------- */
function viewToday(){
  const list = items(i=>i.daily && !isParent(i) && i.state!=='killed');
  const rows = list.length ? list.map((i,idx)=>unitRow(i,idx,'today')).join('') :
    `<div class="empty">Nothing on today's list yet.<br>Pull a compiled task in from <b>Ready to GO!</b></div>`;
  return `
    <div class="viewhead"><h1>TODAY</h1><span class="sub">// executable units only</span></div>
    <p class="lead">Nothing vague is allowed to compete here. Every row has already been compiled into a resumable unit with a concrete first action — so starting is safe, not dangerous.</p>
    <div class="rows">${rows}</div>`;
}
function viewReady(){
  const list = items(i=>i.compiled && !i.daily && !isParent(i) && i.state!=='killed' && i.state!=='done');
  const rows = list.length ? list.map((i,idx)=>unitRow(i,idx,'ready')).join('') :
    `<div class="empty">No compiled tasks waiting.<br>Compile a backlog task and it lands here, ready to activate.</div>`;
  return `
    <div class="viewhead"><h1>READY TO GO!</h1><span class="sub">// compiled · waiting to be activated</span></div>
    <p class="lead">Every task here is already a resumable unit. When you're ready to work one, pull it into <b>Today</b>.</p>
    <div class="rows">${rows}</div>`;
}
function unitRow(i,idx,ctx){
  const f=i.f;
  const crumb = i.parentId ? `<span style="color:var(--violet)">↳ ${esc((get(i.parentId)||{}).title||'')}</span>` : '';
  const resume = i.receipt ? `<div class="resume">⟲ RESUME FROM <b>${esc(i.receipt.resumeFrom||f.resumeFrom)}</b> · do not redo: ${esc(i.receipt.doNotRedo||'—')}</div>` : '';
  const action = ctx==='today'
    ? `<button class="btn amber" onclick="startSession('${i.id}')">▸ Start</button>`
    : `<button class="btn amber" onclick="toDaily('${i.id}')">→ Today</button>`;
  return `<div class="row fade-in s${(idx%4)+1} ${i.state}">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="marker" style="color:${STATES[i.state].color}">${STATES[i.state].sym}</span>
        <div class="ttl"><div class="name">${esc(i.title)}</div>
          <div class="meta">
            <span>${i.domain}</span>${crumb}${f.mode?`<span class="mode-chip">${f.mode}</span>`:''}${chip(i.state)}
          </div></div>
        <div class="acts">
          ${action}
          <button class="btn" onclick="openCompile('${i.id}')">Edit</button>
        </div>
      </div>
      <div class="exec">
        <div><div class="k">First action</div><div class="v">${esc(f.firstAction)||'—'}</div></div>
        <div><div class="k">Description</div><div class="v">${esc(f.description)||'—'}</div></div>
      </div>
      ${resume}
    </div>
  </div>`;
}

/* ---------- RESERVOIR ---------- */
function viewReservoir(){
  const list = items(i=>i.domain==='reservoir' && i.state!=='killed');
  const rows = list.map((i,idx)=>`
    <div class="row fade-in s${(idx%4)+1}">
      <span class="marker" style="color:var(--faint)">~</span>
      <div class="ttl"><div class="name">${esc(i.title)}</div>
        <div class="meta"><span>parked idea</span><span>not a daily task</span></div></div>
      <div class="acts">
        <select class="btn" onchange="promote('${i.id}',this.value)">
          <option value="">→ Promote to…</option>
          ${DOMAINS.map(d=>`<option value="${d}">${d}</option>`).join('')}
        </select>
        <button class="btn ghost" onclick="kill('${i.id}')">✕</button>
      </div>
    </div>`).join('') || `<div class="empty">Reservoir empty. Capture something above ↑</div>`;
  return `
    <div class="viewhead"><h1>BRAIN ROTS</h1><span class="sub">// curiosity reservoir</span></div>
    <p class="lead">Attractive ideas live here <em>before</em> they become commitments. They never reach <b>Today</b> until promoted into a domain and compiled into a concrete artifact.</p>
    <div class="rows">${rows}</div>`;
}

/* ---------- DOMAIN BACKLOG ---------- */
function viewDomain(){
  const d=view.domain;
  const list = items(i=>i.domain===d && !i.parentId);   // top-level only; phases render under parents
  const order = ['active','scout','blocked','needsdef','waiting','idea','deferred','done','killed'];
  list.sort((a,b)=>order.indexOf(a.state)-order.indexOf(b.state));
  const rows = list.map((i,idx)=>backlogRow(i,idx)).join('') ||
    `<div class="empty">No items in ${d} yet.</div>`;
  return `
    <div class="viewhead"><h1>${d}</h1><span class="sub">// domain backlog</span></div>
    <p class="lead">An inventory of possible work states — not a todo list. Set each item's state. The dangerous state is <b style="color:var(--yellow)">important-but-undefined</b>: compile it, defer it, or kill it.</p>
    <div class="rows">${rows}</div>`;
}
function stateSelect(i){
  const opts = Object.entries(STATES).map(([k,s])=>`<option value="${k}" ${i.state===k?'selected':''}>${s.sym} ${s.label}</option>`).join('');
  return `<select class="btn" onchange="setState('${i.id}',this.value)">${opts}</select>`;
}
function backlogRow(i,idx){
  const parent = isParent(i);
  if(parent) return containerGroup(i,idx);
  return `<div class="row fade-in s${(idx%4)+1} ${i.state}">
    <span class="marker" style="color:${STATES[i.state].color}">${STATES[i.state].sym}</span>
    <div class="ttl"><div class="name">${esc(i.title)}</div>
      <div class="meta">
        ${i.compiled?`<span style="color:var(--green)">compiled</span>`:`<span style="color:var(--orange)">not compiled</span>`}
        ${i.f.mode?`<span class="mode-chip">${i.f.mode}</span>`:''}
        ${i.daily?`<span style="color:var(--amber)">on today</span>`:(i.compiled?`<span style="color:var(--cyan)">ready to go</span>`:'')}
      </div></div>
    <div class="acts">
      ${stateSelect(i)}
      <button class="btn amber" onclick="openCompile('${i.id}')">${i.compiled?'Recompile':'Compile'}</button>
    </div>
  </div>`;
}
function containerGroup(i,idx){
  const ch=kids(i.id);
  const total=ch.length, done=ch.filter(c=>c.state==='done').length;
  const pct = total? Math.round(done/total*100):0;
  const open = view.expanded.has(i.id);
  // soft sequencing: first phase that isn't resolved is "next"
  const nextId = (ch.find(c=>c.state!=='done'&&c.state!=='killed')||{}).id;
  const childRows = ch.map((c,k)=>{
    const isNext = c.id===nextId;
    return `<div class="row child ${c.state} ${isNext?'next':''}" style="margin-left:26px">
      <span class="phase-no">${k+1}</span>
      <span class="marker" style="color:${STATES[c.state].color}">${STATES[c.state].sym}</span>
      <div class="ttl"><div class="name">${esc(c.title)}</div>
        <div class="meta">
          <span class="mode-chip">${c.f.mode||'Do'}</span>${chip(c.state)}
          ${c.f.firstAction?`<span>▸ ${esc(c.f.firstAction)}</span>`:`<span style="color:var(--orange)">no first action</span>`}
          ${isNext?`<span style="color:var(--amber)">next</span>`:''}
        </div></div>
      <div class="acts">
        ${stateSelect(c)}
        <button class="btn" onclick="openCompile('${c.id}')">Edit</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="fade-in s${(idx%4)+1}">
    <div class="row parent ${i.state}">
      <button class="caret" onclick="toggleExpand('${i.id}')">${open?'▾':'▸'}</button>
      <span class="marker" style="color:var(--violet)">▦</span>
      <div class="ttl"><div class="name">${esc(i.title)}</div>
        <div class="meta">
          <span style="color:var(--violet)">container</span><span class="mode-chip">Plan</span>${chip(i.state)}
          <span class="prog"><span class="bar" style="width:${pct}%"></span></span>
          <span class="mono" style="font-size:11px;color:var(--dim)">${done}/${total} phases</span>
        </div></div>
      <div class="acts">
        ${stateSelect(i)}
        <button class="btn amber" onclick="openCompile('${i.id}')">Edit phases</button>
      </div>
    </div>
    ${open?childRows:''}
  </div>`;
}
function toggleExpand(id){ view.expanded.has(id)?view.expanded.delete(id):view.expanded.add(id); render(); }

/* ---------- MATRIX ---------- */
const QUAD = {
  'known|bounded':   {n:'Easy execution', t:'EXECUTE NORMALLY', c:'var(--green)',  d:'Procedure known, scope bounded. Just do it.'},
  'unknown|bounded': {n:'Research spike', t:'SCOUT · MAP · DEFINE', c:'var(--cyan)', d:'You don\'t know the first valid move. Map it, then define the next task.'},
  'known|unbounded': {n:'Time trap',      t:'MAKE SUBTASK', c:'var(--orange)',d:'You know the steps but it hides variance. Break it into smaller subtasks.'},
  'unknown|unbounded':{n:'Paralysis trap',t:'TO BE DEFINED', c:'var(--red)', d:'Both unknown and unbounded — how to handle this is still open (TBD).'},
};

/* ============================================================
   ACTIONS
   ============================================================ */
function go(tab,domain){ view.tab=tab; if(domain)view.domain=domain; render(); }
function get(id){ return store.find(i=>i.id===id); }
function kids(id){ return store.filter(i=>i.parentId===id); }
function isParent(i){ return kids(i.id).length>0; }

// roll a container's state up from its phases
function rollup(parentId){
  if(!parentId) return;
  const p=get(parentId); if(!p) return;
  const ch=kids(parentId); if(!ch.length) return;
  const done = ch.filter(c=>c.state==='done').length;
  const resolved = ch.filter(c=>c.state==='done'||c.state==='killed').length;
  if(done===ch.length) p.state='done';
  else if(resolved===ch.length) p.state='deferred';
  else if(ch.some(c=>c.state==='active'||c.state==='scout')) p.state='active';
}

function setState(id,st){
  const i=get(id); i.state=st;
  if(isParent(i) && (st==='killed'||st==='done'||st==='deferred')){
    kids(id).forEach(c=>{ c.state=st; });   // pure containers cascade to their phases
  }
  if(i.parentId) rollup(i.parentId);
  render();
}
function kill(id){ setState(id,'killed'); }

function capture(text){
  if(!text.trim())return;
  store.unshift({id:uid(),title:text.trim(),domain:'reservoir',state:'idea',f:blank(),daily:false,parentId:null,receipt:null});
  if(view.tab!=='reservoir'){ view.tab='reservoir'; }
  render();
}
function promote(id,domain){
  if(!domain)return; const i=get(id); i.domain=domain; i.state='needsdef';
  view.tab='domain'; view.domain=domain; render();
}
function toDaily(id){ get(id).daily=true; render(); }

/* ---------- COMPILE MODAL ---------- */
function openCompile(id){
  const i=get(id), ch=kids(id);
  const isTrap = i.f.procedure==='known' && i.f.scope==='unbounded';
  modal={kind:'compile', id,
    subtasks: !i.parentId && (ch.length>0 || isTrap),
    subs: ch.map(c=>({id:c.id, title:c.title, firstAction:c.f.firstAction}))};
  if(modal.subtasks && !modal.subs.length) modal.subs.push({title:'',firstAction:''});
  renderOverlay();
}
function closeModal(){ modal=null; render(); }
function containerMode(i){ return !i.parentId && modal && modal.subtasks; }

function captureSubs(){
  if(!modal.subs) return;
  const titles=document.querySelectorAll('.sub-title'), fas=document.querySelectorAll('.sub-fa');
  modal.subs.forEach((s,k)=>{ if(titles[k]) s.title=titles[k].value; if(fas[k]) s.firstAction=fas[k].value; });
}
function captureCompile(){
  const i=get(modal.id), f=i.f;
  if($('#c_title')) i.title=$('#c_title').value||i.title;
  ['description','firstAction','risk'].forEach(k=>{ const el=$('#c_'+k); if(el) f[k]=el.value; });
  captureSubs();
}
function addSub(){ captureCompile(); modal.subs.push({title:'',firstAction:''}); renderOverlay(); }
function rmSub(k){ captureCompile(); modal.subs.splice(k,1); renderOverlay(); }
function toggleSubtasks(){
  captureCompile(); modal.subtasks=!modal.subtasks;
  if(modal.subtasks && !modal.subs.length) modal.subs.push({title:'',firstAction:''});
  renderOverlay();
}

function compileGateOk(i){
  const f=i.f;
  if(!f.mode || !f.description.trim()) return false;
  if(containerMode(i)) return (modal.subs||[]).some(s=>s.title.trim());
  return !!f.firstAction.trim();
}

function renderCompile(){
  const i=get(modal.id), f=i.f;
  const child = !!i.parentId;
  const isTrap = f.procedure==='known' && f.scope==='unbounded';
  const cont = containerMode(i);
  const quad = (f.procedure&&f.scope) ? QUAD[f.procedure+'|'+f.scope] : null;
  const cls = (p,s)=>`<div class="cell ${f.procedure===p&&f.scope===s?'sel':''}" style="color:${QUAD[p+'|'+s].c};padding:10px" onclick="pickClass('${p}','${s}')">
      <span class="tag" style="font-size:9px">${QUAD[p+'|'+s].t}</span><h5 style="color:var(--text);font-size:12px">${QUAD[p+'|'+s].n}</h5></div>`;
  const ok = compileGateOk(i);
  const paralysis = f.procedure==='unknown'&&f.scope==='unbounded';
  const nSubs = (modal.subs||[]).filter(s=>s.title.trim()).length;

  let gateTxt, gateCls='';
  if(ok){ gateTxt = cont?`✓ valid container · ${nSubs} phase${nSubs>1?'s':''}`:'✓ valid resumable unit'; gateCls='ok'; }
  else if(paralysis) gateTxt='⚠ unknown + unbounded — to be defined together (TBD)';
  else if(!f.mode) gateTxt='⚠ classify the task above to set its mode';
  else if(cont) gateTxt='⚠ add at least one phase (needs a title)';
  else gateTxt='⚠ fill the required (*) fields';

  const subRows = (modal.subs||[]).map((s,k)=>`
    <div class="subrow">
      <span class="phase-no">${k+1}</span>
      <input class="sub-title" placeholder="phase title" value="${esc(s.title)}">
      <input class="sub-fa" placeholder="first action (optional)" value="${esc(s.firstAction)}">
      <button class="btn ghost" onclick="rmSub(${k})" title="remove">×</button>
    </div>`).join('');

  const execOrSubs = cont
    ? `<div class="field"><label>Phases <span class="req">*</span> — a container is worked through its phases, not directly</label>
         <div class="subs">${subRows||'<div class="hint">no phases yet</div>'}</div>
         <button class="btn" style="margin-top:9px" onclick="addSub()">＋ Add phase</button>
         <div class="hint">Each phase becomes its own startable unit. A phase with a first action goes straight to Ready to GO.</div>
       </div>`
    : `<div class="field"><label>First action <span class="req">*</span></label>
         <input id="c_firstAction" value="${esc(f.firstAction)}" placeholder="the exact first thing to open / run / read / write">
         <div class="hint">If you can't name it, the task is unknown — scout it first.</div></div>`;

  const toggle = child
    ? `<div class="hint">A phase can't be split again — subtasks are one level deep.</div>`
    : isTrap
      ? `<div class="hint" style="color:var(--orange)">Time trap → breaking into phases is required.</div>`
      : `<button class="btn ghost" onclick="toggleSubtasks()">${cont?'↩ back to a single first action':'⑂ break into phases instead'}</button>`;

  return `<div class="scrim" onclick="if(event.target===this)closeModal()"><div class="modal">
    <header><span class="ic">⚙</span><h3>Compile task</h3><button class="x" onclick="closeModal()">×</button></header>
    <div class="pad">
      <div class="note">Classify the task — that sets its <b>mode</b>. A <b style="color:var(--orange)">Time trap</b> is broken into phases; everything else gets a single first action.</div>

      <div class="field"><label>Task</label><input id="c_title" value="${esc(i.title)}"></div>

      <div class="field"><label>Classify — procedure × scope (sets the mode) <span class="req">*</span></label>
        <div class="matrix" style="grid-template-columns:70px 1fr 1fr;gap:6px">
          <div></div><div class="hd" style="font-size:9px">bounded</div><div class="hd" style="font-size:9px">unbounded</div>
          <div class="hd" style="font-size:9px">known</div>${cls('known','bounded')}${cls('known','unbounded')}
          <div class="hd" style="font-size:9px">unknown</div>${cls('unknown','bounded')}${cls('unknown','unbounded')}
        </div>
        ${quad?`<div class="hint" style="color:${quad.c}">▶ ${quad.n}${f.mode?` → mode: <b>${f.mode}</b>`:''} · ${quad.d}</div>`:''}
      </div>

      <div class="field"><label>Description <span class="req">*</span></label>
        <textarea id="c_description" rows="2" placeholder="what is this task, in your own words">${esc(f.description)}</textarea></div>

      ${execOrSubs}
      <div class="field" style="margin-top:-4px">${toggle}</div>

      <div class="field"><label>Risk (likely expansion points)</label><input id="c_risk" value="${esc(f.risk)}" placeholder="known unknowns — optional"></div>
    </div>
    <footer>
      <span class="gate ${gateCls}">${gateTxt}</span>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn amber" onclick="saveCompile()">Compile</button>
    </footer>
  </div></div>`;
}
function pickClass(p,s){
  captureCompile();
  const i=get(modal.id), f=i.f;
  f.procedure=p; f.scope=s; f.mode=CLASS_MODE[p+'|'+s];
  if(!i.parentId && p==='known' && s==='unbounded'){           // Time trap forces phase mode
    modal.subtasks=true;
    if(!modal.subs.length) modal.subs.push({title:'',firstAction:''});
  }
  renderOverlay();
}
function reconcileSubs(parent){
  const keep=new Set();
  (modal.subs||[]).filter(s=>s.title.trim()).forEach(s=>{
    const fa=(s.firstAction||'').trim(), title=s.title.trim();
    if(s.id && get(s.id)){
      const c=get(s.id); c.title=title; c.domain=parent.domain;
      c.f.firstAction=fa; c.f.description=title; c.compiled=!!fa;
      if(c.compiled && (c.state==='idea'||c.state==='needsdef')) c.state='active';
      if(!c.compiled && c.state!=='done' && c.state!=='killed') c.state='needsdef';
      keep.add(s.id);
    } else {
      const id=uid();
      store.push({id, title, domain:parent.domain, parentId:parent.id,
        state:fa?'active':'needsdef', daily:false, compiled:!!fa,
        f:{mode:'Do', description:title, firstAction:fa, risk:'', resumeFrom:'', procedure:'known', scope:'bounded'},
        receipt:null});
      keep.add(id);
    }
  });
  store = store.filter(c=> c.parentId!==parent.id || keep.has(c.id));   // drop removed phases
}
function saveCompile(){
  const i=get(modal.id), f=i.f;
  captureCompile();
  if(!compileGateOk(i)){ renderOverlay(); return; }   // keep open, show the gate warning, preserve input
  if(containerMode(i)){
    reconcileSubs(i);
    i.compiled=true; i.daily=false; f.firstAction='';   // pure container: not directly executable
    rollup(i.id);
    if(i.state!=='done'&&i.state!=='killed'&&i.state!=='active') i.state='active';
    view.expanded.add(i.id);
  } else {
    i.compiled=true;
    if(i.state==='idea'||i.state==='needsdef') i.state=(f.mode==='Scout'?'scout':'active');
  }
  closeModal();
}

/* ---------- SESSION ---------- */
function startSession(id){
  const i=get(id);
  // default block from mode
  const def = i.f.mode==='Scout'?'scout':(i.f.mode==='Do'?'exec':(i.f.mode==='Plan'?'ignition':'deep'));
  const block = BLOCKS.find(b=>b.id===def)||BLOCKS[2];
  session={id, block, remaining:block.min*60, running:true};
  tick(); renderOverlay();
  session.timer=setInterval(()=>{ if(session&&session.running){ session.remaining=Math.max(0,session.remaining-1); tick(); } },1000);
}
function tick(){ const t=$('#sclock'); if(!t)return;
  const m=String(Math.floor(session.remaining/60)).padStart(2,'0');
  const s=String(session.remaining%60).padStart(2,'0'); t.textContent=`${m}:${s}`;
  const ring=$('#sring'); if(ring){const total=session.block.min*60;const frac=session.remaining/total;
    const C=2*Math.PI*88; ring.style.strokeDashoffset=C*(1-frac);}
}
function setBlock(id){ const b=BLOCKS.find(x=>x.id===id); session.block=b; session.remaining=b.min*60; tick(); renderOverlay(); }
function toggleRun(){ session.running=!session.running; renderOverlay(); }
function endSession(){ clearInterval(session.timer); session=null; renderOverlay(); }

function renderSession(){
  const i=get(session.id), f=i.f;
  const blocks=BLOCKS.map(b=>`<button class="${session.block.id===b.id?'on':''}" onclick="setBlock('${b.id}')">
    <span>${b.name}</span><span>${b.min}m</span></button>`).join('');
  const C=2*Math.PI*88;
  return `<div class="session">
    <div class="top">
      <span class="lab">SESSION //</span><h2>${esc(i.title)}</h2>
      <span class="mode-chip">${f.mode}</span>
      <button class="close" onclick="endSession()">⨯ abandon</button>
    </div>
    <div class="stage">
      <div class="clockwrap">
        <div class="ring">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="88" fill="none" stroke="var(--line)" stroke-width="6"/>
            <circle id="sring" cx="100" cy="100" r="88" fill="none" stroke="var(--amber)" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="0" style="filter:drop-shadow(0 0 6px var(--amber))"/>
          </svg>
          <div class="time"><div class="t" id="sclock">--:--</div><div class="bt">${session.block.name}</div></div>
        </div>
        <div class="clockbtns">
          <button class="btn" onclick="toggleRun()">${session.running?'❚❚ Pause':'▸ Resume'}</button>
        </div>
        <div class="blockpick">${blocks}</div>
      </div>
      <div class="work">
        <div class="focus">First action — start here, nothing else</div>
        <div class="fa">${esc(f.firstAction)}</div>
        <div class="swrow">
          <div class="scard"><div class="k">Description</div><div class="v">${esc(f.description)||'—'}</div></div>
          ${f.risk?`<div class="scard"><div class="k" style="color:var(--orange)">! Risk</div><div class="v">${esc(f.risk)}</div></div>`:''}
        </div>
        <div style="margin-top:26px;display:flex;gap:10px">
          <button class="btn amber" style="padding:11px 18px" onclick="openCheckpoint()">⊟ Close session → write checkpoint</button>
        </div>
        <p class="lead" style="margin-top:18px;color:var(--faint);font-size:12px">
          A session is finished when the checkpoint exists — not when the task is done. You can't close cleanly without it.</p>
      </div>
    </div>
  </div>`;
}

/* ---------- CHECKPOINT / RECEIPT ---------- */
function openCheckpoint(){ session.running=false; modal={kind:'checkpoint',id:session.id}; renderOverlay(); }
function renderCheckpoint(){
  const i=get(modal.id), r=i.receipt||{};
  return `<div class="scrim"><div class="modal">
    <header><span class="ic">⊟</span><h3>Checkpoint / receipt</h3></header>
    <div class="pad">
      <div class="note">Externalize the state so future-you resumes without rebuilding context. This is mandatory to close.</div>
      <div class="field"><label>Outcome</label>
        <select id="r_outcome">
          <option value="active" ${r.outcome==='active'?'selected':''}>↻ Continue later (still active)</option>
          <option value="deferred" ${r.outcome==='deferred'?'selected':''}>→ Deferred</option>
          <option value="blocked" ${r.outcome==='blocked'?'selected':''}>! Blocked</option>
          <option value="done" ${r.outcome==='done'?'selected':''}>✓ Done</option>
        </select></div>
      <div class="field"><label>Last state <span class="req">*</span></label><input id="r_lastState" value="${esc(r.lastState)}" placeholder="where things stand right now"></div>
      <div class="field"><label>What changed / what I tried</label><textarea id="r_whatChanged" rows="2" placeholder="evidence, commands, what happened">${esc(r.whatChanged)}</textarea></div>
      <div class="grid2">
        <div class="field"><label>Problems found</label><input id="r_problems" value="${esc(r.problems)}"></div>
        <div class="field"><label>Next action <span class="req">*</span></label><input id="r_nextAction" value="${esc(r.nextAction)}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Resume from <span class="req">*</span></label><input id="r_resumeFrom" value="${esc(r.resumeFrom||i.f.resumeFrom)}"></div>
        <div class="field"><label>Do not redo</label><input id="r_doNotRedo" value="${esc(r.doNotRedo)}"></div>
      </div>
    </div>
    <footer>
      <span class="gate" id="r_gate">⚠ last state · next action · resume from are required</span>
      <button class="btn" onclick="modal={kind:'session-back'};reopenSession()">Back</button>
      <button class="btn amber" onclick="saveCheckpoint()">Save & close</button>
    </footer>
  </div></div>`;
}
function reopenSession(){ modal=null; renderOverlay(); }
function saveCheckpoint(){
  const id=modal.id, i=get(id);
  const r={
    outcome:$('#r_outcome').value, lastState:$('#r_lastState').value, whatChanged:$('#r_whatChanged').value,
    problems:$('#r_problems').value, nextAction:$('#r_nextAction').value,
    resumeFrom:$('#r_resumeFrom').value, doNotRedo:$('#r_doNotRedo').value
  };
  if(!r.lastState.trim()||!r.nextAction.trim()||!r.resumeFrom.trim()){
    const g=$('#r_gate'); g.textContent='⚠ fill last state · next action · resume from'; g.style.color='var(--red)'; return;
  }
  i.receipt=r; i.state=r.outcome;
  if(r.outcome==='done') i.daily=false;
  if(i.parentId) rollup(i.parentId);
  modal=null;
  if(session){clearInterval(session.timer);session=null;}
  view.tab='today'; render();
}

/* ============================================================
   BOOT
   ============================================================ */
function renderOverlay(){
  const o=$('#overlay');
  if(session && !(modal&&modal.kind==='checkpoint')) { o.innerHTML=renderSession(); tick(); return; }
  if(modal&&modal.kind==='compile')    return o.innerHTML=renderCompile();
  if(modal&&modal.kind==='checkpoint') return o.innerHTML=renderCheckpoint();
  if(session) { o.innerHTML=renderSession(); tick(); return; }
  o.innerHTML='';
}
function render(){ renderAside(); renderMain(); renderOverlay(); }

$('#capInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ capture(e.target.value); e.target.value=''; }});
renderTicker(); setInterval(renderTicker,6000);
render();
</script>
