services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: checkpoint
      POSTGRES_PASSWORD: checkpoint
      POSTGRES_DB: checkpoint
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkpoint -d checkpoint"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  identity-service:
    build:
      context: ./services/identity-service
    environment:
      DATABASE_URL: postgresql+psycopg://checkpoint:checkpoint@postgres:5432/checkpoint
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-checkpoint-secret-change-me}
      ACCESS_TOKEN_SECONDS: 900
      REFRESH_TOKEN_SECONDS: 2592000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  checkpoint-service:
    build:
      context: ./services/checkpoint-service
    environment:
      DATABASE_URL: postgresql+psycopg://checkpoint:checkpoint@postgres:5432/checkpoint
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8001
      CHECKPOINT_SERVICE_URL: http://checkpoint-service:8002
      JWT_SECRET: ${JWT_SECRET:-dev-checkpoint-secret-change-me}
      FRONTEND_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      identity-service:
        condition: service_healthy
      checkpoint-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
