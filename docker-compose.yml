services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: checkpoint
      POSTGRES_USER: checkpoint
      POSTGRES_PASSWORD: ${DB_PASSWORD:-checkpoint}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkpoint -d checkpoint"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://checkpoint:${DB_PASSWORD:-checkpoint}@postgres:5432/checkpoint
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SEED_ON_START: ${SEED_ON_START:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    # entrypoint runs `alembic upgrade head` (+ optional seed) then uvicorn

  web:
    build: ./web
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pgdata:
