services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkpoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-checkpoint}
      POSTGRES_DB: ${POSTGRES_DB:-checkpoint}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-checkpoint} -d ${POSTGRES_DB:-checkpoint}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  identity-service:
    build:
      context: ./services/identity-service
    networks:
      default:
        aliases:
          - ${IDENTITY_HOST:-identity.${DOMAIN_NAME:-infiniteai.space}}
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-infiniteai.space}
      DATABASE_URL: ${IDENTITY_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-checkpoint}:${POSTGRES_PASSWORD:-checkpoint}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-checkpoint}}
      REDIS_URL: ${REDIS_URL:-redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-dev-checkpoint-secret-change-me}
      ACCESS_TOKEN_SECONDS: 900
      REFRESH_TOKEN_SECONDS: 2592000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  checkpoint-service:
    build:
      context: ./services/checkpoint-service
    networks:
      default:
        aliases:
          - ${CHECKPOINT_HOST:-checkpoint-service.${DOMAIN_NAME:-infiniteai.space}}
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-infiniteai.space}
      DATABASE_URL: ${CHECKPOINT_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-checkpoint}:${POSTGRES_PASSWORD:-checkpoint}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-checkpoint}}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  api-gateway:
    build:
      context: ./services/api-gateway
    networks:
      default:
        aliases:
          - ${API_HOST:-api.${DOMAIN_NAME:-infiniteai.space}}
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-infiniteai.space}
      IDENTITY_HOST: ${IDENTITY_HOST:-identity.${DOMAIN_NAME:-infiniteai.space}}
      CHECKPOINT_HOST: ${CHECKPOINT_HOST:-checkpoint-service.${DOMAIN_NAME:-infiniteai.space}}
      WEB_HOST: ${WEB_HOST:-${DOMAIN_NAME:-infiniteai.space}}
      IDENTITY_SERVICE_URL: ${IDENTITY_SERVICE_URL:-http://${IDENTITY_HOST:-identity.${DOMAIN_NAME:-infiniteai.space}}:${IDENTITY_PORT:-8001}}
      CHECKPOINT_SERVICE_URL: ${CHECKPOINT_SERVICE_URL:-http://${CHECKPOINT_HOST:-checkpoint-service.${DOMAIN_NAME:-infiniteai.space}}:${CHECKPOINT_PORT:-8002}}
      JWT_SECRET: ${JWT_SECRET:-dev-checkpoint-secret-change-me}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://${WEB_HOST:-${DOMAIN_NAME:-infiniteai.space}}:${WEB_PORT:-5173}}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      identity-service:
        condition: service_healthy
      checkpoint-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./web
    networks:
      default:
        aliases:
          - ${WEB_HOST:-${DOMAIN_NAME:-infiniteai.space}}
    environment:
      VITE_DOMAIN_NAME: ${DOMAIN_NAME:-infiniteai.space}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://${API_HOST:-api.${DOMAIN_NAME:-infiniteai.space}}:${API_PORT:-8000}}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
